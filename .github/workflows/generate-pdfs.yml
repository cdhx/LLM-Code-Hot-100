name: Generate PDFs

on:
  push:
    paths:
      - 'docs/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pandoc and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-lang-chinese fonts-noto-cjk
      
      - name: Generate PDFs
        run: |
          mkdir -p pdfs
          for f in docs/*.md; do
            name=$(basename "$f" .md)
            echo "Converting $f to pdfs/${name}.pdf"
            pandoc "$f" -o "pdfs/${name}.pdf" \
              --pdf-engine=xelatex \
              -V mainfont="Noto Sans CJK SC" \
              -V monofont="Noto Sans Mono CJK SC" \
              -V geometry:margin=1in \
              -V colorlinks=true \
              --highlight-style=tango \
              || echo "Failed to convert $f"
          done
      
      - name: Commit PDFs
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add pdfs/
          git diff --staged --quiet || git commit -m "docs: 自动生成 PDF 文档"
          git push
